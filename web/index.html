<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="말트임 — 입으로 익히는 진짜 일본어">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="말트임 일본어">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>말트임 일본어</title>
  <link rel="manifest" href="manifest.json">

  <!-- Microsoft Cognitive Services Speech SDK -->
  <script src="https://cdn.jsdelivr.net/npm/microsoft-cognitiveservices-speech-sdk@latest/distrib/browser/microsoft.cognitiveservices.speech.sdk.bundle-min.js"></script>
  <script>
    // 현재 진행 중인 Azure 재생 1건만 추적한다.
    window.__azureActive = null;

    // 모든 재생에 재사용하는 단일 <audio> 엘리먼트.
    // (iOS WebKit은 AudioContext 개수를 강하게 제한하므로, 매 재생마다 SDK 내부
    //  AudioContext를 새로 만들면 2~3회 후 무음이 된다. 데이터만 합성해 하나의
    //  오디오 엘리먼트로 재생하면 이 제한을 피할 수 있다.)
    window.__ttsAudioEl = null;
    window.__ttsGainNode = null;
    // 마이크 사용 중 TTS 볼륨이 작게 들리는 문제 보정용 게인 배율.
    // (브라우저가 마이크 사용 시 음성 인식 에코 제거 처리로 출력 음량을
    //  줄이는 현상을 보정한다. 필요시 값 조정.)
    window.MIC_DUCK_COMPENSATION = 1.6;
    window.__getTtsAudioEl = function() {
      if (!window.__ttsAudioEl) {
        const el = new Audio();
        el.preload = 'auto';
        el.setAttribute('playsinline', '');
        window.__ttsAudioEl = el;
        try {
          const Ctx = window.AudioContext || window.webkitAudioContext;
          if (Ctx) {
            const ctx = new Ctx();
            const source = ctx.createMediaElementSource(el);
            const gain = ctx.createGain();
            gain.gain.value = window.__micActive
                ? window.MIC_DUCK_COMPENSATION
                : 1.0;
            source.connect(gain);
            gain.connect(ctx.destination);
            window.__ttsAudioCtx = ctx;
            window.__ttsGainNode = gain;
          }
        } catch (e) {}
      }
      return window.__ttsAudioEl;
    };

    // 마이크 듣기 시작/종료 시 호출되어 TTS 출력 게인을 보정한다.
    // gain.value를 즉시 바꾸면 연속듣기에서 마이크가 켜졌다 꺼질 때마다
    // 볼륨이 "뚝뚝" 튀는 것처럼 들린다. setTargetAtTime으로 부드럽게 전환한다.
    window.__micActive = false;
    window.setMicActiveWeb = function(active) {
      window.__micActive = !!active;
      const gainNode = window.__ttsGainNode;
      const ctx = window.__ttsAudioCtx;
      if (gainNode && ctx) {
        // 마이크 인식 중 AudioContext가 suspended 상태로 전환되는 경우가
        // 있어, 이때는 setTargetAtTime의 currentTime이 멈춰 게인 보정이
        // 적용되지 않거나 다음 호출 시 누적되어 볼륨이 불안정해진다.
        if (ctx.state === 'suspended') {
          try { ctx.resume(); } catch (e) {}
        }
        const target = window.__micActive
            ? window.MIC_DUCK_COMPENSATION
            : 1.0;
        // 이전에 예약된 램프가 남아있으면 새 목표값과 충돌해 들썩이는
        // 현상이 생길 수 있으므로 먼저 취소한다.
        try { gainNode.gain.cancelScheduledValues(ctx.currentTime); } catch (e) {}
        gainNode.gain.setTargetAtTime(target, ctx.currentTime, 0.15);
      }
    };

    // 사용자 제스처 안에서 호출해 오디오 엘리먼트를 언락한다 (iOS 자동재생 정책).
    window.unlockTtsAudioWeb = function() {
      try {
        const el = window.__getTtsAudioEl();
        if (window.__ttsAudioCtx && window.__ttsAudioCtx.state === 'suspended') {
          try { window.__ttsAudioCtx.resume(); } catch (e) {}
        }
        el.muted = true;
        const p = el.play();
        if (p && p.then) {
          p.then(() => { el.pause(); el.currentTime = 0; el.muted = false; })
           .catch(() => { el.muted = false; });
        } else {
          el.pause(); el.muted = false;
        }
      } catch (e) {}
    };

    window.stopAzureTtsWeb = function() {
      const a = window.__azureActive;
      window.__azureActive = null;
      if (a && a.settle) { try { a.settle(false); } catch (e) {} }
      try {
        const el = window.__ttsAudioEl;
        if (el) { el.pause(); }
      } catch (e) {}
    };

    // 오디오 '데이터'만 합성한 뒤(SDK 내부 오디오 출력 미사용), 재사용 오디오
    // 엘리먼트로 재생하고 실제 'ended' 시점에 resolve 한다.
    window.playAzureTtsWeb = function(text, key, region, voice, rateMultiplier, lang) {
      window.stopAzureTtsWeb();

      return new Promise((resolve, reject) => {
        try {
          if (typeof SpeechSDK === 'undefined') {
            reject("Azure Speech SDK is not loaded.");
            return;
          }

          const speechConfig = SpeechSDK.SpeechConfig.fromSubscription(key, region);
          speechConfig.speechSynthesisOutputFormat =
            SpeechSDK.SpeechSynthesisOutputFormat.Audio24Khz48KBitRateMonoMp3;
          // audioConfig = null → 스피커로 직접 재생하지 않고 result.audioData 반환
          const synthesizer = new SpeechSDK.SpeechSynthesizer(speechConfig, null);

          const entry = { synthesizer: synthesizer, settle: null, done: false, url: null };
          const finish = (val) => {
            if (entry.done) return;
            entry.done = true;
            if (window.__azureActive === entry) window.__azureActive = null;
            if (entry.url) { try { URL.revokeObjectURL(entry.url); } catch (e) {} }
            try { synthesizer.close(); } catch (e) {}
            resolve(val);
          };
          entry.settle = finish;
          window.__azureActive = entry;

          const escapedText = text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&apos;');

          const ssmlLang = lang || 'ja-JP';
          const ssml = `<speak version='1.0' xml:lang='${ssmlLang}'>
            <voice xml:lang='${ssmlLang}' name='${voice}'>
              <prosody rate="${rateMultiplier}">
                ${escapedText}
              </prosody>
            </voice>
          </speak>`;

          synthesizer.speakSsmlAsync(
            ssml,
            result => {
              if (result.reason === SpeechSDK.ResultReason.SynthesizingAudioCompleted &&
                  result.audioData && result.audioData.byteLength > 0) {
                try {
                  const blob = new Blob([result.audioData], { type: 'audio/mpeg' });
                  const url = URL.createObjectURL(blob);
                  entry.url = url;
                  const el = window.__getTtsAudioEl();
                  el.onended = () => finish(true);
                  el.onerror = () => finish(false);
                  el.muted = false;
                  el.src = url;
                  const pp = el.play();
                  if (pp && pp.catch) { pp.catch(() => finish(false)); }
                } catch (e) {
                  finish(false);
                }
              } else {
                finish(false);
              }
            },
            error => { finish(false); }
          );
        } catch (e) {
          reject("Azure Speech SDK error: " + e.toString());
        }
      });
    };

    // Azure STT + 발음 평가(Pronunciation Assessment).
    // referenceText가 있으면 해당 문장을 기준으로 정확도/유창성/완성도/종합 점수를
    // 함께 계산한다. 결과는 JSON 문자열로 resolve: { text, pronunciation, error }
    window.__azureSttActive = null;

    window.stopAzureSttWeb = function() {
      const entry = window.__azureSttActive;
      window.__azureSttActive = null;
      if (entry && entry.recognizer) {
        try { entry.recognizer.close(); } catch (e) {}
      }
    };

    window.startAzureSttWeb = function(key, region, locale, referenceText) {
      window.stopAzureSttWeb();

      return new Promise((resolve, reject) => {
        try {
          if (typeof SpeechSDK === 'undefined') {
            reject("Azure Speech SDK is not loaded.");
            return;
          }

          const speechConfig = SpeechSDK.SpeechConfig.fromSubscription(key, region);
          speechConfig.speechRecognitionLanguage = locale;
          const audioConfig = SpeechSDK.AudioConfig.fromDefaultMicrophoneInput();
          const recognizer = new SpeechSDK.SpeechRecognizer(speechConfig, audioConfig);

          if (referenceText && referenceText.trim().length > 0) {
            try {
              const paConfig = new SpeechSDK.PronunciationAssessmentConfig(
                referenceText,
                SpeechSDK.PronunciationAssessmentGradingSystem.HundredMark,
                SpeechSDK.PronunciationAssessmentGranularity.Phoneme,
                true
              );
              paConfig.applyTo(recognizer);
            } catch (e) {}
          }

          const entry = { recognizer: recognizer, done: false };
          window.__azureSttActive = entry;

          const finish = (val) => {
            if (entry.done) return;
            entry.done = true;
            if (window.__azureSttActive === entry) window.__azureSttActive = null;
            try { recognizer.close(); } catch (e) {}
            resolve(val);
          };

          recognizer.recognizeOnceAsync(
            result => {
              if (result.reason === SpeechSDK.ResultReason.RecognizedSpeech) {
                let pronunciation = null;
                try {
                  const par = SpeechSDK.PronunciationAssessmentResult.fromResult(result);
                  pronunciation = {
                    accuracyScore: par.accuracyScore,
                    fluencyScore: par.fluencyScore,
                    completenessScore: par.completenessScore,
                    pronScore: par.pronunciationScore
                  };
                } catch (e) {}
                finish(JSON.stringify({ text: result.text, pronunciation: pronunciation }));
              } else if (result.reason === SpeechSDK.ResultReason.NoMatch) {
                finish(JSON.stringify({ text: '', pronunciation: null }));
              } else {
                finish(JSON.stringify({ text: '', pronunciation: null, error: 'recognition_failed' }));
              }
            },
            error => {
              finish(JSON.stringify({ text: '', pronunciation: null, error: String(error) }));
            }
          );
        } catch (e) {
          reject("Azure STT error: " + e.toString());
        }
      });
    };

    // 문장 전환용 짧은 효과음 (WebAudio 비프, 에셋 불필요). 끝나면 resolve.
    window.playChimeWeb = function() {
      return new Promise((resolve) => {
        try {
          const Ctx = window.AudioContext || window.webkitAudioContext;
          if (!Ctx) { resolve(true); return; }
          window.__chimeCtx = window.__chimeCtx || new Ctx();
          const ctx = window.__chimeCtx;
          if (ctx.state === 'suspended') { try { ctx.resume(); } catch (e) {} }
          const now = ctx.currentTime;
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          // 두 음(미→솔) 짧은 상승 차임
          osc.frequency.setValueAtTime(660, now);
          osc.frequency.setValueAtTime(880, now + 0.12);
          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.exponentialRampToValueAtTime(0.25, now + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.32);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(now);
          osc.stop(now + 0.34);
          osc.onended = () => resolve(true);
          setTimeout(() => resolve(true), 450); // 안전망
        } catch (e) {
          resolve(true);
        }
      });
    };
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
