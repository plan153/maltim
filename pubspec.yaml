name: my_japanese_app
description: "말트임 — 입으로 익히는 진짜 일본어. 문장·문절 단위 듣기/따라 말하기 연습 앱"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 재사용 핵심 엔진 (순수 Dart: 채점·정렬·피드백·시퀀서 + LanguageConfig)
  pronunciation_engine:
    path: packages/pronunciation_engine

  # 발음 평가 (STT)
  speech_to_text: ^7.0.0
  # 마이크 권한
  permission_handler: ^11.0.0
  # 듣기 (로컬 TTS 폴백)
  flutter_tts: ^4.0.2
  # Azure Neural TTS 오디오 재생 (네이티브)
  audioplayers: ^6.0.0
  # Azure TTS REST 호출 (네이티브)
  http: ^1.2.0
  # 진행도/문장 로컬 저장
  shared_preferences: ^2.2.3
  # 타이포그래피 (Noto Sans JP + 한글)
  google_fonts: ^6.1.0
  # 네비게이션
  go_router: ^14.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
